services:
  postgres:
    image: postgres:latest
    env_file: "envs/postgres.env"
    ports:
      - "5433:5432"
    volumes:
      - "./init:/docker-entrypoint-initdb.d/"
    command: postgres -c max_connections=500

  kafka:
    image: apache/kafka:latest
    ports:
      - "9094:9094"
    env_file: "envs/kafka.env"

  jobmanager:
    image: flink:latest
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager

  taskmanager:
    image: flink:latest
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2

  jupyter:
    build: .
    ports:
      - "8888:8888"
    volumes:
      - ./apps:/home/jovyan/work
      - ./data:/home/jovyan/data
    env_file: "envs/jupyter.env"
    command: jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser